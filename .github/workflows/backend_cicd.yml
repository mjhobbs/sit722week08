name: CICD - Deploy Backend Services to AKS

on:
  workflow_dispatch:
    inputs:
      aks_cluster_name:
        description: 'Name of the AKS Cluster to deploy to'
        required: true
        default: 'week08-aks'
      arc_container_name:
        description: 'Name of the ACR Container (without .azurecr.io)'
        required: true
        default: 'week08arc'
      aks_resource_group:
        description: 'Resource Group of the AKS Cluster'
        required: true
        default: 'week08-rg'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./backend/product_service/
          push: true
          tags: ${{ github.event.inputs.arc_container_name }}.azurecr.io/product_service:latest

      - name: Set AKS context
        uses: azure/aks-set-context@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          cluster-name: myAKSCluster
          resource-group: myResourceGroup

      - name: Deploy to AKS
        run: kubectl apply -f k8s/deployment.yaml
